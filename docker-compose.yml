# Local mirror of the API + MCP service. For day-to-day iteration prefer
# `make watch` (cargo-watch). docker compose is for the "ship-shape preview"
# path and as the local mirror of prod.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: repo-recall-api:dev
    ports:
      - "7777:7777"
    environment:
      REPO_RECALL_HOST: "0.0.0.0"
      REPO_RECALL_PORT: "7777"
      REPO_RECALL_CWD: "/work"
    volumes:
      - ${HOME}/projects/coilysiren:/work:ro
      - ${HOME}/.claude:/home/repo-recall/.claude:ro
