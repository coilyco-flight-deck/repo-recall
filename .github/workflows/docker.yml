name: docker

# Build + publish the API image to GHCR on every push to main and on tag pushes.
# Image: ghcr.io/coilysiren/repo-recall-api (Rust + axum + MCP on :7777).
# Homelab redeploy is pull-side (kai-server `repo-recall-update.service`);
# GitHub Actions does not touch K3s or the tailnet (#92).

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/repo-recall-api
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=repo-recall-api
          cache-to: type=gha,scope=repo-recall-api,mode=max
          # Tag-derived version passed to build.rs so tag builds report a
          # real version; falls through to git describe on main commits.
          build-args: |
            REPO_RECALL_VERSION=${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
