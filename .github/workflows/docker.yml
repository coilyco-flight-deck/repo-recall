name: docker

# Build and push the two container images to GHCR.
#
# Images:
#   ghcr.io/coilysiren/repo-recall-api  (Dockerfile, Rust + axum + MCP on :7777)
#   ghcr.io/coilysiren/repo-recall-web  (Dockerfile.web, caddy + static SPA)
#
# Tags (per image): `latest` on main, plus the short commit SHA. The k3s
# deploy in coilysiren/infrastructure pins to `latest` for the tailnet-only
# path; switch to a sha- or tag-pinned image once the deploy stabilizes.
#
# Trigger: push to main, and tag pushes (the release workflow pushes tags;
# this lets a release publish a versioned image without rerunning Cargo for
# every pre-tag commit).

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: repo-recall-api
            dockerfile: Dockerfile
          - image: repo-recall-web
            dockerfile: Dockerfile.web
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          # Pass tag-derived version to build.rs so the binary reports a
          # real version when built from a tag. Falls through to
          # `git describe` on plain main commits.
          build-args: |
            REPO_RECALL_VERSION=${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
