name: release

# Fully automatic release on every push to main:
#
# 1. Conventional-commit subjects since the last tag are scanned to compute
#    the next semver bump. No conventional commits → no release.
#      feat: …    → minor       fix: …     → patch
#      feat!: …   → major       (also `BREAKING CHANGE:` in body)
# 2. Cargo.toml + Cargo.lock are bumped, committed back to main, and tagged.
# 3. A GitHub Release is created with the auto-generated changelog.
# 4. The new tarball sha256 is computed and pushed *directly* to
#    coilysiren/homebrew-tap — no PR step. brew upgrade picks it up.
#
# No "Release PR" anywhere in the loop.
#
# Manual setup (one-time, requires Kai):
#   gh secret set HOMEBREW_TAP_TOKEN --repo coilysiren/repo-recall
#     value: a fine-grained PAT scoped to coilysiren/homebrew-tap with
#            `Repository permissions → Contents: Read and write`
#
# Loop safety:
#   The bump commit is pushed with the workflow's GITHUB_TOKEN, which by
#   GitHub policy does NOT re-trigger workflows — so this job won't recurse
#   on itself. CI for the bump commit doesn't run for the same reason; the
#   pre-bump commit already passed CI, and the bump only changes versions.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version (dry run)
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Don't release on plain commits — only conventional ones bump.
          default_bump: false
          release_branches: main
          # Compute the version + changelog without yet creating the tag;
          # we'll create it ourselves after the Cargo.toml bump commit.
          dry_run: true

      - name: Stop early if no release
        if: ${{ steps.tag.outputs.new_tag == '' }}
        run: echo "no conventional commits since last tag — skipping release"

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ steps.tag.outputs.new_tag != '' }}

      - name: Bump Cargo.toml + lockfile, commit, tag, push
        if: ${{ steps.tag.outputs.new_tag != '' }}
        env:
          VER: ${{ steps.tag.outputs.new_version }}
          TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          set -euo pipefail
          # Replace ONLY the top-level [package] version, not any dep
          # version that happens to match. Anchor on the package block.
          python3 - <<'PY'
          import os, re, pathlib
          p = pathlib.Path("Cargo.toml")
          src = p.read_text()
          ver = os.environ["VER"]
          new = re.sub(
              r'(?m)^(version\s*=\s*")[^"]+(")',
              lambda m: m.group(1) + ver + m.group(2),
              src,
              count=1,
          )
          p.write_text(new)
          PY
          cargo update --workspace --quiet
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release ${TAG}"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin HEAD:main --follow-tags

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  bump-tap:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - name: Compute tarball sha256
        id: sha
        run: |
          set -euo pipefail
          url="https://github.com/coilysiren/repo-recall/archive/refs/tags/${TAG}.tar.gz"
          # Tags can take a few seconds to propagate to the archive endpoint
          # after the release job pushes them. Retry briefly to absorb that.
          for i in 1 2 3 4 5; do
            if sha=$(curl -fsSL "$url" | shasum -a 256 | cut -d' ' -f1); then
              break
            fi
            sleep 5
          done
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: coilysiren/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Bump Formula and push directly
        env:
          NEW_URL: ${{ steps.sha.outputs.url }}
          NEW_SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -euo pipefail
          cd homebrew-tap
          file=Formula/repo-recall.rb
          sed -i "s|^  url \".*\"|  url \"${NEW_URL}\"|" "$file"
          sed -i "s|^  sha256 \".*\"|  sha256 \"${NEW_SHA}\"|" "$file"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$file"
          git commit -m "repo-recall: bump to ${TAG}"
          git push origin HEAD:main
