name: release

# Tag-only release on every push to main:
#
# 1. Every commit triggers at least a patch bump. Conventional-commit
#    subjects bump higher:
#      <plain>    -> patch       fix: ...     -> patch
#      feat: ...  -> minor       feat!: ...   -> major  (also `BREAKING CHANGE:`)
# 2. Tag is created at the pushed commit. No commit is written back to main.
# 3. A GitHub Release is cut with the auto-generated changelog.
# 4. The new tarball sha256 is computed, then a repository_dispatch is
#    fired to coilysiren/homebrew-tap whose own bump-repo-recall workflow
#    rewrites Formula/repo-recall.rb via the Contents API. The receiver
#    lives in homebrew-tap so the commit is signed by GitHub's web-flow
#    key (only installation-token API commits are auto-signed) and clears
#    the signed-commits ruleset.
#
# Version source of truth at build time is build.rs, which reads
# $REPO_RECALL_VERSION (set by the brew Formula and by anyone building from
# a release tarball) or falls back to `git describe`. Cargo.toml's version
# field is pinned at 0.0.0-dev and is no longer touched by CI - that's the
# whole point of this flow. The previous bump-commit hid CI status from the
# prior commit by burying it under a green-by-default chore commit.
#
# All `${{ }}` interpolations below are repo-controlled (action outputs,
# job needs, secrets) - no github.event.* untrusted input flows into run blocks.
#
# Manual setup (one-time, requires Kai):
#   gh secret set HOMEBREW_TAP_TOKEN --repo coilysiren/repo-recall
#     value: a fine-grained PAT scoped to coilysiren/homebrew-tap with
#            `Repository permissions -> Contents: Read and write`

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Release on every commit. Plain commits get a patch bump;
          # `feat:` bumps minor; `feat!:` / `BREAKING CHANGE:` bumps major.
          default_bump: patch
          release_branches: main

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  bump-tap:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - name: Compute tarball sha256
        id: sha
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          url="https://github.com/coilysiren/repo-recall/archive/refs/tags/${TAG}.tar.gz"
          # Tags can take a few seconds to propagate to the archive endpoint
          # after the release job pushes them. Retry briefly to absorb that.
          for i in 1 2 3 4 5; do
            if sha=$(curl -fsSL "$url" | shasum -a 256 | cut -d' ' -f1); then
              break
            fi
            sleep 5
          done
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Dispatch bump to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
          NEW_URL: ${{ steps.sha.outputs.url }}
          NEW_SHA: ${{ steps.sha.outputs.sha }}
        # The homebrew-tap ruleset requires signed commits. A PAT-driven
        # `git push` or Contents-API call from this runner produces an
        # unsigned commit and is rejected. Instead we trigger the
        # bump-repo-recall workflow in homebrew-tap, where the built-in
        # GITHUB_TOKEN (an installation token) drives the Contents API
        # and the resulting commit is web-flow-signed by GitHub.
        run: |
          set -euo pipefail
          gh api -X POST repos/coilysiren/homebrew-tap/dispatches \
            -f event_type=bump-repo-recall \
            -f "client_payload[tag]=${TAG}" \
            -f "client_payload[url]=${NEW_URL}" \
            -f "client_payload[sha]=${NEW_SHA}"
