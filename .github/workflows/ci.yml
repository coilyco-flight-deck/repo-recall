name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features --no-fail-fast

  # macOS-arm64 runner + a pinned v4.2.4 standalone binary from the
  # tailwindcss GitHub release so CI produces the same minified bytes
  # Kai's dev env produces. Two drift axes both bit us before getting
  # here: linux-x64 v4.2.4 vs macOS-arm64 v4.2.4 (platform output is
  # not deterministic) and brew tailwindcss 4.2.2 vs 4.2.4 (the macos
  # runner's brew lags). Pinning the release URL nails both.
  css:
    name: tailwind build in sync
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: install tailwindcss v4.2.4
        run: |
          curl -fsSL -o /usr/local/bin/tailwindcss \
            https://github.com/tailwindlabs/tailwindcss/releases/download/v4.2.4/tailwindcss-macos-arm64
          chmod +x /usr/local/bin/tailwindcss
          tailwindcss --help >/dev/null
      - run: make css-check
