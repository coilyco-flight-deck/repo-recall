name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features --no-fail-fast

  # macOS runner so the standalone tailwindcss output matches Kai's dev
  # environment byte-for-byte. v4.2.4 minified output is platform-specific
  # (linux-x64 binary produces different bytes than macOS-arm64) so a
  # linux runner here would always diff against a bundle generated by
  # `brew install tailwindcss` locally, even though both call themselves
  # v4.2.4.
  css:
    name: tailwind build in sync
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: install tailwindcss
        run: brew install tailwindcss
      - run: make css-check
