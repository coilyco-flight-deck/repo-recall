name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features --no-fail-fast

  # No css job: the tailwindcss v4 standalone CLI does not produce
  # byte-identical output across builds (linux-x64 vs macOS-arm64 differ,
  # and same-platform builds at the same version still drift), so a
  # css-check gate in CI was a coin flip. The pre-commit hook regenerates
  # the bundle on every commit that touches static/tailwind.input.css,
  # any .rs file, or any static/.js file, which is the actual point of
  # control. The committed static/tailwind.css is what gets shipped via
  # Docker COPY and via the brew Formula's static dir; CI doesn't model
  # that pipeline meaningfully by re-minifying the same input.
