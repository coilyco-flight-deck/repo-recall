name: release

# Forgejo-canonical release pipeline. Triggers on push to main against
# the forgejo repo (forgejo.coilysiren.me/coilyco-flight-deck/repo-recall).
# Cuts the tag + release on forgejo, then two formula-bump jobs pin the new
# tag+revision via forgejo Contents API, and attaches the Windows binary
# that coilyco-bridge/scoop-bucket consumes.
#
# Brew now installs from the centralized flight-deck tap:
#   brew tap coilyco-flight-deck/tap https://forgejo.coilysiren.me/coilyco-flight-deck/homebrew-tap
#   brew install coilyco-flight-deck/tap/repo-recall
#
# bump-tap-formula writes that central tap. The per-repo bump-formula
# (Formula/repo-recall.rb in this repo) is kept fresh for one migration
# cycle as a fallback for the old direct-repo tap:
#   brew tap coilyco-flight-deck/repo-recall https://forgejo.coilysiren.me/coilyco-flight-deck/repo-recall
#   brew install coilyco-flight-deck/repo-recall/repo-recall
# Drop bump-formula + Formula/repo-recall.rb next release cycle.
#
# Version is baked at build time via build.rs from $REPO_RECALL_VERSION.
# Shared composite actions live at coilysiren/agentic-os/actions/*.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: docker
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
      changelog: ${{ steps.tag.outputs.changelog }}
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: tag
        uses: coilysiren/agentic-os/actions/tag-bump@main
        # No bump input: every push-to-main release is a minor bump. For a
        # major, cut the vN.0.0 tag by hand; pushes resume minor from there.

      - id: create
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: coilysiren/agentic-os/actions/create-release@main
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  bump-formula:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - id: rev
        shell: bash
        run: |
          set -euo pipefail
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: coilysiren/agentic-os/actions/bump-formula@main
        with:
          formula_path: Formula/repo-recall.rb
          tag: ${{ needs.release.outputs.tag }}
          revision: ${{ steps.rev.outputs.revision }}
          forgejo_token: ${{ secrets.CI_RELEASE_TOKEN }}

  bump-tap-formula:
    # Centralized monorepo tap: rewrite Formula/repo-recall.rb in
    # coilyco-flight-deck/homebrew-tap to pin the just-cut tag + revision.
    # Reuses the same composite action as bump-formula, but points `repo`
    # at the tap and overrides `url_template` to a literal so the pinned
    # url still targets this source repo (not the tap). Cross-repo write,
    # so it uses CI_RELEASE_TOKEN (org-level write:repository PAT on
    # coilyco-flight-deck) rather than the auto job token. This is the
    # primary install path; the per-repo bump-formula above stays one
    # cycle as a fallback for the old direct-repo tap.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - id: rev
        shell: bash
        run: |
          set -euo pipefail
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: coilysiren/agentic-os/actions/bump-formula@main
        with:
          repo: coilyco-flight-deck/homebrew-tap
          formula_path: Formula/repo-recall.rb
          tag: ${{ needs.release.outputs.tag }}
          revision: ${{ steps.rev.outputs.revision }}
          url_template: "https://forgejo.coilysiren.me/coilyco-flight-deck/repo-recall.git"
          message: "chore(formula): bump repo-recall to {TAG} [skip ci]"
          forgejo_token: ${{ secrets.CI_RELEASE_TOKEN }}

  windows-assets:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: docker
    container: rust:bookworm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Install mingw + windows target
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends mingw-w64
          rustup target add x86_64-pc-windows-gnu

      - id: build
        shell: bash
        env:
          REPO_RECALL_VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          cargo build --release --locked --target x86_64-pc-windows-gnu
          out="repo-recall-windows-amd64.exe"
          cp "target/x86_64-pc-windows-gnu/release/repo-recall.exe" "$out"
          sha256sum "$out" | awk '{print $1}' > "$out.sha256"
          echo "exe=$out" >> "$GITHUB_OUTPUT"
          echo "sha=$out.sha256" >> "$GITHUB_OUTPUT"

      - uses: coilysiren/agentic-os/actions/upload-release-asset@main
        with:
          release_id: ${{ needs.release.outputs.release_id }}
          file: ${{ steps.build.outputs.exe }}

      - uses: coilysiren/agentic-os/actions/upload-release-asset@main
        with:
          release_id: ${{ needs.release.outputs.release_id }}
          file: ${{ steps.build.outputs.sha }}
