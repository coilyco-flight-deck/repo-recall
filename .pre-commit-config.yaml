repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]

  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        args: ["--all", "--"]
      - id: clippy
        args: ["--all-targets", "--all-features", "--", "-D", "warnings"]

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.82.13
    hooks:
      - id: trufflehog
        name: trufflehog (secrets scan)
        entry: trufflehog filesystem --no-verification --fail --exclude-paths=.trufflehog-exclude .
        language: system
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: coily-trailer
        name: coily audit-log trailer
        description: Append Audit-log trailers to the commit message based on coily's audit log for this repo.
        entry: coily git trailer-hook
        language: system
        stages: [prepare-commit-msg]
        always_run: true
        require_serial: true

  # BEGIN managed by agentic-os/scripts/apply-agentic-os-hooks.py
  - repo: https://github.com/coilysiren/agentic-os
    rev: v0.11.1
    hooks:
      - id: catalog-doc-size
      - id: catalog-trifecta
      - id: documentation-layout
      - id: context-load-points
      - id: code-comments
      - id: catalog-block-present
      - id: validate-skills
      - id: dead-cross-links
      - id: repo-pointer-skills
      - id: closes-issue
      - id: conventional-commit
      - id: trufflehog
      - id: coily-trailer
  # END managed by agentic-os/scripts/apply-agentic-os-hooks.py
