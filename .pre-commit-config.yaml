repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^static/tailwind\.css$
      - id: end-of-file-fixer
        exclude: ^static/tailwind\.css$
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]

  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        args: ["--all", "--"]
      - id: clippy
        args: ["--all-targets", "--all-features", "--", "-D", "warnings"]

  - repo: local
    hooks:
      - id: tailwindcss
        name: tailwindcss (compile static/tailwind.css)
        entry: tailwindcss -i static/tailwind.input.css -o static/tailwind.css --minify
        language: system
        files: ^(static/tailwind\.input\.css|src/.*\.rs|static/.*\.js)$
        pass_filenames: false

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.82.13
    hooks:
      - id: trufflehog
        name: trufflehog (secrets scan)
        entry: trufflehog filesystem --no-verification --fail --exclude-paths=.trufflehog-exclude .
        language: system
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: coily-trailer
        name: coily audit-log trailer
        description: Append Audit-log trailers to the commit message based on coily's audit log for this repo.
        entry: coily git trailer-hook
        language: system
        stages: [prepare-commit-msg]
        always_run: true
        require_serial: true




  # BEGIN managed by agentic-os/scripts/apply-agentic-os-hooks.py
  - repo: https://github.com/coilysiren/agentic-os
    rev: v0.2.1
    hooks:
      # catalog-doc-size + catalog-trifecta deferred until trim issue lands.
      - id: catalog-block-present
      - id: validate-skills
      - id: dead-cross-links
      - id: closes-issue
      - id: conventional-commit
      # catalog-doc-size + catalog-trifecta deferred until trifecta/trim work lands.
  # END managed by agentic-os/scripts/apply-agentic-os-hooks.py
