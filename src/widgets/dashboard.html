<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repo-recall — dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1115;
      color: #e6e8eb;
      padding: 16px;
      font-size: 13px;
      line-height: 1.4;
    }
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2f37;
    }
    h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
    .meta { color: #8b94a3; font-size: 11px; font-variant-numeric: tabular-nums; }
    .banner { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .stat {
      display: flex;
      flex-direction: column;
      padding: 8px 12px;
      background: #181c24;
      border: 1px solid #2a2f37;
      border-radius: 6px;
      min-width: 80px;
    }
    .stat-label { color: #8b94a3; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { color: #e6e8eb; font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .stat.alert .stat-value { color: #f87171; }
    section h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b94a3;
      margin: 16px 0 8px;
    }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #1e232c; vertical-align: top; }
    th {
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #8b94a3;
      background: #161a21;
    }
    tr:hover td { background: #161a21; }
    td.repo-name { font-weight: 500; }
    td.numeric { font-variant-numeric: tabular-nums; text-align: right; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .pill-alert { background: #3b1115; color: #fca5a5; border: 1px solid #5b1a20; }
    .pill-warn { background: #3a2a0d; color: #fcd34d; border: 1px solid #5a4214; }
    .pill-info { background: #0e2138; color: #93c5fd; border: 1px solid #1e3a5e; }
    .signals { display: flex; gap: 4px; flex-wrap: wrap; }
    .empty { color: #6b7380; font-style: italic; padding: 24px; text-align: center; }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      color: #c4cad3;
    }
  </style>
</head>
<body>
  <header>
    <h1>repo-recall</h1>
    <div class="meta" id="meta"></div>
  </header>
  <div class="banner" id="banner"></div>
  <section id="action-required-section" hidden>
    <h2>Action required</h2>
    <table>
      <thead>
        <tr><th>repo</th><th>signal</th><th>detail</th></tr>
      </thead>
      <tbody id="action-required"></tbody>
    </table>
  </section>
  <section>
    <h2>Repos</h2>
    <table>
      <thead>
        <tr>
          <th>name</th>
          <th class="numeric">sessions</th>
          <th class="numeric">commits/30d</th>
          <th class="numeric">churn/30d</th>
          <th>signals</th>
        </tr>
      </thead>
      <tbody id="repos"></tbody>
    </table>
    <div id="empty" class="empty" hidden>No repos indexed yet. The initial scan may still be running.</div>
  </section>

  <script>
    "use strict";

    function fmtNum(n) {
      if (n == null) return "";
      return new Intl.NumberFormat("en-US").format(n);
    }

    function fmtTs(ts) {
      if (!ts) return "never";
      const ageSec = Math.floor((Date.now() / 1000) - ts);
      if (ageSec < 60) return ageSec + "s ago";
      if (ageSec < 3600) return Math.floor(ageSec / 60) + "m ago";
      if (ageSec < 86400) return Math.floor(ageSec / 3600) + "h ago";
      return Math.floor(ageSec / 86400) + "d ago";
    }

    function pillClass(signal) {
      if (signal === "ci_failing" || signal === "deploy_failing") return "pill-alert";
      if (signal === "dirty_tree" || signal === "in_progress_op" || signal === "detached_head") return "pill-warn";
      return "pill-info";
    }

    function makeStatNode(label, value, alert) {
      const el = document.createElement("div");
      el.className = "stat" + (alert ? " alert" : "");
      const labelEl = document.createElement("span");
      labelEl.className = "stat-label";
      labelEl.textContent = label;
      const valueEl = document.createElement("span");
      valueEl.className = "stat-value";
      valueEl.textContent = fmtNum(value);
      el.appendChild(labelEl);
      el.appendChild(valueEl);
      return el;
    }

    function makePillNode(signal) {
      const el = document.createElement("span");
      el.className = "pill " + pillClass(signal);
      el.textContent = signal;
      return el;
    }

    function clearChildren(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function makeCell(text, klass) {
      const td = document.createElement("td");
      if (klass) td.className = klass;
      td.textContent = text == null ? "" : String(text);
      return td;
    }

    function renderActionRequiredRow(a) {
      const tr = document.createElement("tr");
      tr.appendChild(makeCell(a.repo_name, "repo-name"));

      const tdSig = document.createElement("td");
      tdSig.appendChild(makePillNode(a.signal));
      tr.appendChild(tdSig);

      tr.appendChild(makeCell(a.detail || ""));
      return tr;
    }

    function renderRepoRow(r) {
      const tr = document.createElement("tr");

      const tdName = document.createElement("td");
      tdName.className = "repo-name";
      tdName.appendChild(document.createTextNode(r.name || ""));
      tdName.appendChild(document.createElement("br"));
      const codeEl = document.createElement("code");
      codeEl.textContent = r.path || "";
      tdName.appendChild(codeEl);
      tr.appendChild(tdName);

      tr.appendChild(makeCell(fmtNum(r.session_count), "numeric"));
      tr.appendChild(makeCell(fmtNum(r.commits_30d), "numeric"));
      tr.appendChild(makeCell(fmtNum(r.loc_churn_30d), "numeric"));

      const tdSigs = document.createElement("td");
      const sigBox = document.createElement("div");
      sigBox.className = "signals";
      (r.signals || []).forEach(s => sigBox.appendChild(makePillNode(s)));
      tdSigs.appendChild(sigBox);
      tr.appendChild(tdSigs);

      return tr;
    }

    function render(data) {
      const empty = document.getElementById("empty");
      if (!data) {
        empty.hidden = false;
        return;
      }

      document.getElementById("meta").textContent =
        `scan v${data.scan_version || 0} — last ${fmtTs(data.last_scan)}`;

      const banner = document.getElementById("banner");
      clearChildren(banner);
      const ar = data.action_required || [];
      banner.appendChild(makeStatNode("repos", data.repos?.length || 0));
      banner.appendChild(makeStatNode("action req'd", ar.length, ar.length > 0));
      banner.appendChild(makeStatNode("sessions", data.session_count || 0));
      banner.appendChild(makeStatNode("commits/30d", data.commits_30d || 0));

      document.getElementById("action-required-section").hidden = ar.length === 0;
      const arBody = document.getElementById("action-required");
      clearChildren(arBody);
      ar.forEach(a => arBody.appendChild(renderActionRequiredRow(a)));

      const repos = data.repos || [];
      empty.hidden = repos.length > 0;
      const reposBody = document.getElementById("repos");
      clearChildren(reposBody);
      repos.forEach(r => reposBody.appendChild(renderRepoRow(r)));
    }

    // MCP App data delivery: receive postMessage from the host.
    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data) return;
      if (data.type === "mcp-tool-result" && data.result) {
        render(data.result);
      } else if (data.toolOutput) {
        render(data.toolOutput);
      }
    });

    // ChatGPT Apps SDK fallback: data injected on window.openai.toolOutput
    if (typeof window !== "undefined" && window.openai && window.openai.toolOutput) {
      render(window.openai.toolOutput);
    }
  </script>
</body>
</html>
