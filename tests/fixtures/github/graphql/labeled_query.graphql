query {
  q0: search(type: ISSUE, first: 100, query: "label:\"structural-ask\" is:open repo:coilysiren/repo-recall repo:coilysiren/coilyco-ai") {
    nodes {
      __typename
      ... on Issue {
        number
        title
        createdAt
        closedAt
        state
        repository { nameWithOwner }
        labels(first: 25) { nodes { name } }
      }
    }
  }
  q1: search(type: ISSUE, first: 100, query: "label:\"autonomous-block\" is:open repo:coilysiren/repo-recall repo:coilysiren/coilyco-ai") {
    nodes {
      __typename
      ... on Issue {
        number
        title
        createdAt
        closedAt
        state
        repository { nameWithOwner }
        labels(first: 25) { nodes { name } }
      }
    }
  }
}
